# nyxloom project config — groop (adopted 2026-07-15, user go after the
# manual wave landed main@f77727e clean, 1618 tests green).
# Project root = groop/ subdir (git ops resolve upward to the vbpub repo;
# lets pwmcp register as its own project later).

[project]
id = "groop"
default_branch = "main"
worktree_root = "../.worktrees"
handoff_globs = ["handoff/*.md"]
decisions_inbox = "docs/DECISIONS-INBOX.md"
reports_dir = "handoff/reports"

# The documented groop gate: fresh/refreshed venv with groop[dev] extras,
# then the suite (P84 lesson: the [dev] venv IS part of the oracle).
# Trusted project-declared argv (never model-supplied). {worktree} = the
# attempt's checkout; gate venv keyed on it so parallel attempts don't share.
[gates.groop-suite]
argv = ["bash", "-c", "set -e; V=/tmp/nyxloom-gate-$(echo {worktree} | md5sum | cut -c1-8); [ -x $V/bin/python ] || python3 -m venv $V; $V/bin/pip install -q -e '{worktree}/groop[dev]'; cd {worktree} && $V/bin/python -m pytest groop/tests -q"]
phase = "implementation"
timeout_seconds = 1800
environment = "gate-venv"

[gates.py-compile]
argv = ["bash", "-c", "cd {worktree} && python3 -m py_compile $(git diff --name-only main...HEAD -- '*.py' | tr '\\n' ' ')"]
phase = "implementation"
timeout_seconds = 120
environment = "local"

[mutexes.merge-lane]
scope = "project"
capacity = 1

[policy]
max_active_tasks = 4
ready_queue_target = 5
max_attempts_per_task = 3
merge_mode = "manual"
retention_days = 60
max_consecutive_zero_progress_merges = 3
stall_log_quiet_seconds = 300
reconcile_interval_seconds = 30
wave_max_diffs = 3
http_port = 8942

[notify]
ntfy_url = "https://ntfy.gstammtisch.dchive.de"
ntfy_topic = "nyxloom-groop"
# token: NTFY_TOKEN env on the daemon process (deny-all server) — value in
# nyxloom/ntfy/.secrets/nyxloom-token, never in this file.
cmd_topic = "nyxloom-cmd"
