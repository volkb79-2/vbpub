# Patch-stack configuration, sourced by scripts/*.sh
# FORK_REPO: your GitHub fork of wings (used by CI + push helpers).
# PLACEHOLDER — set this when the fork exists.
FORK_REPO="OWNER/wings"

PTERODACTYL_REMOTE="https://github.com/pterodactyl/wings.git"
PTERODACTYL_REF="v1.13.1"
PTERODACTYL_GO_IMAGE="golang:1.24"

PELICAN_REMOTE="https://github.com/pelican-dev/wings.git"
PELICAN_REF="main"
PELICAN_GO_IMAGE="golang:1.25"

# Deliberately registry-less image name: a stray `docker compose pull` fails
# loudly instead of silently reverting to the stock upstream image.
IMAGE_PREFIX="wings-local"

# Upstream packages with pre-existing `go vet` findings (pterodactyl v1.13.1);
# excluded from strict vet so OUR patches stay at zero new warnings.
VET_EXCLUDE_RE='wings/(server|server/filesystem|router|router/downloader)$'
