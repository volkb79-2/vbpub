# /etc/wings-cg-profiles.conf — rules for wings-cg-reconcile.sh
# Format: <match> <systemd properties...>
#   <match> = slice:<unit name>   -> apply to that slice (started if needed)
#           = <container glob>    -> apply to matching containers' scopes
#
# Slice-held values are preferred (survive container recreation); scope rules
# are for knobs not represented on a slice.

# Tier slice (see t0b/wings.slice for the unit-file variant of these values)
slice:wings.slice MemoryLow=12G CPUWeight=800

# Per-container scope tuning by container name (wings names containers by
# server UUID). Example: a specific game server.
# b87c0a5b-* MemoryHigh=8G CPUWeight=800 IOWeight=500
