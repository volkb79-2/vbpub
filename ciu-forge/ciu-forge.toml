# ciu-forge self-config (dogfood, S2 format).
# This is the first consumer of the unified [project.<name>] schema (P5).

[github]
owner = "volkb79-2"
repo = "vbpub"
# token is read from GITHUB_PUSH_PAT env var (never stored here)

[targets]
host = "github"
registry = []  # ciu-forge is a wheel; no OCI images

[orchestration]
default_steps = ["build", "push"]

[project.ciu-forge]
prefix = "ciu-forge-v"
artifact = "wheel"
cwd = "ciu-forge"
scm_dist = "ciu-forge"

[project.ciu-forge.version]
strategy = "scm"
paths = ["ciu-forge", "release-manager/src"]
bump = "conventional"

[project.ciu-forge.steps.build]
commands = [
  { label = "ciu-forge: build wheel", argv = ["python3", "-m", "build", "--wheel", "--outdir", "dist"], cwd = "ciu-forge" },
]

[project.ciu-forge.steps.push]
required_env = ["GITHUB_PUSH_PAT", "GITHUB_USERNAME", "GITHUB_REPO"]
commands = [
  { label = "ciu-forge: publish wheel", argv = ["python3", "scripts/publish-wheel.py"], cwd = "ciu-forge" },
]

[project.ciu-forge.publish]
source = "ciu-forge/dist/*.whl"
latest_json = true

[project.ciu-forge.resolve]
asset_glob = "ciu_forge-*.whl"

[project.ciu-forge.getsh]
install_dir = "/opt/ciu-forge"
preserve = []
