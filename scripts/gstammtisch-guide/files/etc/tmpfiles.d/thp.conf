# Transparent Huge Pages: 'madvise' (not 'always') on a zswap-heavy, memory-
# constrained host. 'always' makes the kernel compress/swap 2 MB units, which
# wastes pool space and hurts the compression ratio under pressure. Apps that
# genuinely benefit opt in with madvise(MADV_HUGEPAGE).
w! /sys/kernel/mm/transparent_hugepage/enabled - - - - madvise
w! /sys/kernel/mm/transparent_hugepage/defrag  - - - - madvise
