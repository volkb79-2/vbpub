# KSM (Kernel Samepage Merging) — OPTIONAL. Only useful for processes opted in
# via prctl(PR_SET_MEMORY_MERGE,1); ksmd idles cheaply until something is marked.
# Read-only image pages are ALREADY shared via the page cache — KSM only dedups
# identical ANONYMOUS pages across processes. As of 2026-07-21 the Soulmask
# game server IS opted in on both instances (LD_PRELOAD=ksm-optin.so — see
# MEASUREMENTS.md M7); dev containers may also opt in ad hoc.
# See MEMORY-ARCHITECTURE.md §6. Remove this file if you don't want KSM.
#
# If a line errors at boot, that knob doesn't exist on your kernel — check with
#   ls /sys/kernel/mm/ksm/
w! /sys/kernel/mm/ksm/run                     - - - - 1
w! /sys/kernel/mm/ksm/advisor_mode            - - - - scan-time
w! /sys/kernel/mm/ksm/advisor_target_scan_time - - - - 200
# All-zero anon pages (fresh calloc/mmap, not yet written) map straight to the
# kernel's shared zero-page instead of the general merge path — proactively
# frees that RAM without waiting for memory pressure to push it through zswap
# (added 2026-07-21, see MEASUREMENTS.md M7).
w! /sys/kernel/mm/ksm/use_zero_pages          - - - - 1
