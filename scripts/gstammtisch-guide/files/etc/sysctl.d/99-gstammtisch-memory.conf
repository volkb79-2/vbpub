# gstammtisch — memory/swap tuning for a zswap-fronted, RAM-constrained host.
# Reasoning: see gstammtisch-guide/MEMORY-ARCHITECTURE.md (§4 sysctl).

# High swappiness: with zswap, reclaiming anonymous pages is CHEAP (they land in
# the compressed RAM pool, not on disk). We WANT cold anon pushed into zswap so
# file cache (Docker layers/libs, build cache) stays resident. The game server is
# protected with cgroup memory.min, NOT by lowering swappiness. (range 0-200)
vm.swappiness = 100

# Keep dentry/inode caches (<100 = prefer to keep them). Docker does an enormous
# amount of path lookups during container create/teardown and builds.
vm.vfs_cache_pressure = 50

# Wake kswapd earlier so background reclaim starts before pressure is acute —
# smoother under bursty container churn and build storms. Default 10.
vm.watermark_scale_factor = 50

# No swap readahead. Wasteful on SSD / thin-provisioned backing and on zswap
# fault-back (random access). 0 => 1 page per fault.
vm.page-cluster = 0

# Reserve ~64 MB so root can always SSH in and act, even under OOM.
vm.admin_reserve_kbytes = 65536
