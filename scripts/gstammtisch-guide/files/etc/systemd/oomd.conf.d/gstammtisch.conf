# systemd-oomd global thresholds. Per-slice "kill dev first" behaviour is set on
# dev-workloads.slice (ManagedOOMMemoryPressure=kill). This catches runaway
# memory/swap pressure FAST and predictably, before the system thrashes — the
# safety net that makes vm.swappiness=100 + large swap safe.
[OOM]
SwapUsedLimit=90%
DefaultMemoryPressureLimit=60%
DefaultMemoryPressureDurationSec=20s
