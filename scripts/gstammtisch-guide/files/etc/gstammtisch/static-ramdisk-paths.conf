# soulmask-static-ramdisk-setup.sh reads this file: one path per line,
# relative to a Soulmask instance's volume root
# (/var/lib/pterodactyl/volumes/<uuid>/<path>). Each may be a directory or a
# single file — the setup script handles both identically via `mount --bind`.
# Blank lines and lines starting with # are ignored.
#
# Every path here is verified byte-identical across instances (same
# depot/game version) and read-only during normal operation — steamcmd
# updates are the only thing that legitimately changes them, which is why
# WS/Saved, WS/Config, steamcmd/ (the update tool itself), and any
# archive-*.tar.gz backup are deliberately NOT listed here (see SOULMASK.md
# "Cluster wiring" / dedup discussion, 2026-07-21).
#
# Sized 2026-07-21 on soulmask2 (b87c0a5b): Engine 138M, WS/Binaries 138M,
# linux64 51M, Steam 6.1M, steamclient.so 46M, libsteamwebrtc.so 7.3M —
# ~386M total. Small top-level text/script files (LICENSE_ThirdParty.txt,
# Manifest_*.txt, WSServer.sh, StartServer.sh) deliberately excluded —
# negligible size, not worth the config-file entries.
Engine
WS/Binaries
linux64
Steam
steamclient.so
libsteamwebrtc.so
