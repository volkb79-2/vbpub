repo_root = "."

[github]
username = "your-github-username"
repo = "vbpub"
token = ""
owner_type = "user"   # required: "user" | "org" (removes the modern-debian-tools probe)

[registry]
url = "ghcr.io"

[env]
# Shared environment variables for all projects.
# Put project-specific defaults in each project's build-push.toml [env].

[orchestration]
project_order = ["ciu", "modern-debian-tools-python-debug", "pwmcp"]
default_projects = ["ciu", "modern-debian-tools-python-debug", "pwmcp"]
default_steps = ["run-tests", "build", "push", "validate"]
execution_mode = "project-first"

[orchestration.step_project_order]
run-tests = ["ciu", "modern-debian-tools-python-debug", "pwmcp"]
build = ["ciu", "modern-debian-tools-python-debug", "pwmcp"]
push = ["ciu", "modern-debian-tools-python-debug", "pwmcp"]
validate = ["ciu", "modern-debian-tools-python-debug", "pwmcp"]

[cleanup]
# Apply cleanup globally regardless of tag prefix.
release_tag_prefixes = ["*"]
keep_release_tags = [
  "ciu-latest",
  "pwmcp-latest",
]
ghcr_packages = ["*"]

[projects.ciu]
# prefix + scm_dist enable per-project version pinning via setuptools_scm (S12)
prefix = "ciu-v"
scm_dist = "ciu"

[projects.ciu.steps.run-tests]
commands = [
  { label = "CIU: run tests", argv = ["python3", "run-ciu-tests.py"], cwd = "ciu" },
]

[projects.ciu.steps.build]
commands = [
  { label = "CIU: build wheel", argv = ["python3", "build-wheel.py"], cwd = "ciu" },
]

[projects.ciu.steps.push]
commands = [
  { label = "CIU: publish wheel", argv = ["python3", "publish-wheel.py"], cwd = "ciu" },
]

[projects.ciu.steps.validate]
commands = [
  { label = "CIU: validate latest wheel", argv = ["python3", "tools/validate-wheel-latest.py"], cwd = "ciu" },
]

[projects.modern-debian-tools-python-debug]
prefix = "modern-debian-tools-python-debug-v"

[projects.modern-debian-tools-python-debug.steps.build]
commands = [
  { label = "modern-debian-tools-python-debug: build images", argv = ["python3", "build-push.py", "--build"], cwd = "modern-debian-tools-python-debug" },
]

[projects.modern-debian-tools-python-debug.steps.push]
commands = [
  { label = "modern-debian-tools-python-debug: push images", argv = ["python3", "build-push.py", "--push"], cwd = "modern-debian-tools-python-debug" },
]

[projects.pwmcp]
prefix = "pwmcp-v"

[projects.pwmcp.steps.build]
commands = [
  { label = "pwmcp: resolve playwright version + compute release tag", argv = ["python3", "scripts/resolve-playwright-version.py"], cwd = "pwmcp" },
  { label = "pwmcp: build playwright-server image", argv = ["python3", "build-push.py", "--build"], cwd = "pwmcp" },
  { label = "pwmcp: build stack bundle", argv = ["python3", "scripts/build-bundle.py"], cwd = "pwmcp" },
]

[projects.pwmcp.steps.push]
commands = [
  { label = "pwmcp: push playwright-server image", argv = ["python3", "build-push.py", "--push"], cwd = "pwmcp" },
  { label = "pwmcp: publish stack bundle", argv = ["python3", "scripts/publish-bundle.py"], cwd = "pwmcp" },
]

[projects.tls-edge]
prefix = "tls-edge-v"

[projects.tls-edge.steps.push]
# tls-edge has no build step — a release is just a git tag.
# Before running: echo "TLS_EDGE_VERSION=0.2.0" > tls-edge/.release-vars
# After running:  git push origin main tls-edge-v<version>
commands = [
  { label = "tls-edge: bump VERSION, commit, and create release tag", argv = ["bash", "scripts/release.sh"], cwd = "tls-edge" },
]

[projects.empyrion-translation]
prefix = "empyrion-translation-v"

[projects.empyrion-translation.steps.build]
commands = [
  { label = "empyrion: package DE translation artifact", argv = ["python3", "release-empyrion-translation.py"], cwd = "game_stuff/empyrion" },
]

[projects.empyrion-translation.steps.push]
commands = [
  { label = "empyrion: publish DE translation artifact", argv = ["python3", "release-empyrion-translation.py", "--publish-github", "--publish-only"], cwd = "game_stuff/empyrion" },
]
