project_root = "."
log_dir = "logs"
release_config = "../cmru.toml"

[env]
CMRU_RELEASE_NOTES = "## cmru wheel\nBuild, publish, and release orchestration for CIU-family monorepos.\n\n**Install**\n```bash\npipx install cmru-*.whl\n# or\npython -m pip install cmru-*.whl\n```"

[steps.build-wheel]
clean_dirs = ["dist"]
commands = [
  { label = "cmru: build wheel", argv = ["python3", "-m", "build", "--wheel", "--outdir", "dist"], cwd = "." },
]

[steps.publish-wheel]
required_env = ["GITHUB_PUSH_PAT", "GITHUB_USERNAME", "GITHUB_REPO"]
commands = [
  { label = "cmru: publish wheel", argv = ["python3", "scripts/publish-wheel.py"], cwd = "." },
]
