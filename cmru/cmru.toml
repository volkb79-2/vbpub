# cmru self-config (dogfood, S2 format).
# This is the first consumer of the unified [project.<name>] schema.

[github]
owner = "volkb79-2"
repo = "vbpub"
# token is read from GITHUB_PUSH_PAT env var (never stored here)

[targets]
host = "github"
registry = []  # cmru is a wheel; no OCI images

[orchestration]
default_steps = ["build", "push"]

[project.cmru]
prefix = "cmru-v"
artifact = "wheel"
cwd = "cmru"
scm_dist = "cmru"

[project.cmru.version]
strategy = "scm"
paths = ["cmru"]
bump = "conventional"

[project.cmru.steps.build]
commands = [
  { label = "cmru: build wheel", argv = ["python3", "-m", "build", "--wheel", "--outdir", "dist"], cwd = "cmru" },
]

[project.cmru.steps.push]
required_env = ["GITHUB_PUSH_PAT", "GITHUB_USERNAME", "GITHUB_REPO"]
commands = [
  { label = "cmru: publish wheel", argv = ["python3", "scripts/publish-wheel.py"], cwd = "cmru" },
]

[project.cmru.publish]
source = "cmru/dist/*.whl"
latest_json = true

[project.cmru.resolve]
asset_glob = "cmru-*.whl"

[project.cmru.getsh]
install_dir = "/opt/cmru"
preserve = []
