# =============================================================================
# nyxloom project config — nyxloom itself (self-hosted / dogfooding).
# This doubles as the BEST-PRACTICE TEMPLATE: every field is documented, and
# the layout under `.nyxloom/` is the recommended structure (see STANDARD.md).
# Copy this into <project>/.nyxloom/project.toml and adjust the marked values.
# =============================================================================

[project]
id = "nyxloom"
default_branch = "main"

# --- managed folders (all under .nyxloom/ so it is OBVIOUS they are managed) ---
# A dotted, tool-named namespace signals "these documents follow nyxloom
# standards (schema-validated frontmatter, P<NN>-<slug> naming)". Prefer this
# over a bare `handoff/` at the repo root, which reads like an ordinary folder.
# (nyxloom's own packages currently still live at ./handoff — migration to
# .nyxloom/handoffs is the recommended follow-up; see STANDARD.md §Migration.)
handoff_globs   = ["handoff/*.md"]          # RECOMMENDED: [".nyxloom/handoffs/*.md"]
reports_dir     = "handoff/reports"          # RECOMMENDED: ".nyxloom/reports"
decisions_inbox = "handoff/DECISIONS.md"     # RECOMMENDED: ".nyxloom/decisions.md"
# Worktrees live one level up (vbpub is the git repo; nyxloom is a subdir).
worktree_root   = "../.worktrees"

# --- the gate: NEVER the devcontainer (cockpit doctrine). nyxloom gates in the
#     tester-unified container, same python (3.14) the nyxloomd runtime uses.
#     {worktree} = the attempt's checkout; the nyxloom package is at
#     {worktree}/nyxloom. Trusted, project-declared argv (never model-supplied).
[gates.tester-unified]
argv = ["bash", "-c", "docker run --rm -v /home/vb/volkb79-2/vbpub:/workspaces/vbpub tester-unified:local bash -c 'cd {worktree}/nyxloom && PYTHONPATH=src /opt/tester-venv/bin/python -m pytest tests -q'"]
phase = "implementation"
timeout_seconds = 1800
environment = "tester-unified"

[policy]
max_active_tasks = 3
ready_queue_target = 5
max_attempts_per_task = 3
merge_mode = "manual"          # nyxloomd never auto-merges; a human/frontier review does
retention_days = 60
max_consecutive_zero_progress_merges = 3
reconcile_interval_seconds = 30
http_port = 8942

# --- notifications: hostname (nyxloom.<fqdn>) already scopes everything to
#     nyxloom, so channels are simple + shared across projects, tagged by
#     project in the message body (NOT per-project topics).
[notify]
ntfy_url = "https://nyxloom.gstammtisch.dchive.de"
notifications_topic = "notifications"   # any progress update
feedback_topic = "feedback"             # open decisions + agent escalation Q&A

# --- SELF-HOSTING CAVEAT (nyxloom managing its own dev) --------------------
# Worktree isolation + manual merge keep the RUNNING nyxloomd safe from a
# broken in-flight change (the daemon runs from the merged main, in a
# container). But a merge that changes daemon-core code needs a CONTAINER
# REBUILD + restart (`ciu up --dir nyxloom/nyxloomd`) to take effect — the
# live daemon keeps the old code until then. Gate daemon-core packages
# accordingly and rebuild after merge.
