# ─── nyxloom pwmcp-instance — nyxloom's OWN browser / UI-testing service ──────
# A nyxloom-owned Playwright-as-a-Service (pwmcp), scoped to nyxloom's own
# network so nyxloom never reaches into dstdns's shared pwmcp (and vice-versa).
# Consumes the published image ghcr.io/volkb79-2/pwmcp as a regular consumer
# (this is NOT the image source — that lives at vbpub/pwmcp, the build/publish
# tooling; consumers run the published image on their own network).
#
# WHY nyxloom-owned: the browser must reach the nyxloom dashboard at
# nyxloomd:8942, which lives on nyxloom-prod-nyxloomd-net. Attaching THIS
# container to that one network gives both legs with no cross-project bridging:
#   * browser (inside this container)      -> http://nyxloomd:8942/
#   * devcontainer (already on that net)   -> the MCP at http://pwmcp:8931/mcp
# This matches the security boundary: the devcontainer joins ONLY nyxloom's net.
#
# Bring up:   docker compose -f nyxloom/pwmcp-instance/docker-compose.yml up -d
# Tear down:  docker compose -f nyxloom/pwmcp-instance/docker-compose.yml down
# Claude Code (launched from the nyxloom root) reaches the MCP via nyxloom/.mcp.json
# -> http://pwmcp:8931/mcp. The UI under test is http://nyxloomd:8942/www/*.html.

name: nyxloom-pwmcp-instance

services:
  pwmcp:
    image: ghcr.io/volkb79-2/pwmcp:latest
    pull_policy: always
    container_name: nyxloom-prod-pwmcp   # clearly owned: nyxloom / prod / pwmcp
    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    shm_size: "2gb"                        # Chromium shared memory
    restart: unless-stopped
    environment:
      # @playwright/mcp DNS-rebind guard: only these Host headers are honoured on
      # :8931. Includes the wire alias the devcontainer connects to (pwmcp:8931)
      # plus the container name. The network already controls WHO can connect.
      PWMCP_MCP_ALLOWED_HOSTS: "pwmcp:8931,nyxloom-prod-pwmcp:8931,pwmcp-mcp:8931,pwmcp-playwright:8931"
      PWMCP_RUN_SERVER_PORT: "3000"
      PWMCP_RUN_SERVER_UPSTREAM_PORT: "3001"
      PWMCP_RUN_SERVER_ADMIN_PORT: "8940"
      PWMCP_RUN_SERVER_DEFAULT_LEASE_S: "1800"
      PWMCP_RUN_SERVER_MAX_LEASE_S: "7200"
      PWMCP_RUN_SERVER_MAX_CLIENTS: "2"
      PWMCP_RUN_SERVER_IDLE_RECYCLE_S: "30"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      nyxloomd:
        aliases:
          - pwmcp             # wire alias in nyxloom/.mcp.json (http://pwmcp:8931/mcp)
          - pwmcp-mcp
          - pwmcp-playwright
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  # nyxloom's daemon network (owned by the nyxloomd stack). External here: we
  # ATTACH to it, we don't define it — so the browser reaches nyxloomd:8942 and
  # the devcontainer reaches this pwmcp, all on the one nyxloom network.
  nyxloomd:
    external: true
    name: nyxloom-prod-nyxloomd-net
