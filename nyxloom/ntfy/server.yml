# ntfy server configuration — nyxloom notification channel.
# Mounted read-only at /etc/ntfy/server.yml. SAFE-GOVERNANCE BASELINE:
# deny-all auth (every publish/subscribe needs a user or token), no signup,
# no attachments, bounded cache, conservative visitor rate limits.
# Reference: https://docs.ntfy.sh/config/

base-url: "https://nyxloom.gstammtisch.dchive.de"
listen-http: ":8080"            # in-container, non-root; published only via tls-edge
behind-proxy: true              # trust X-Forwarded-For from the edge for rate limiting

# ── AuthN/AuthZ: default-deny everything ────────────────────────────────────
auth-file: "/var/lib/ntfy/auth.db"
auth-default-access: "deny-all"
enable-signup: false
enable-login: true
enable-reservations: false

# ── Message cache: bounded, no attachments ──────────────────────────────────
cache-file: "/var/lib/ntfy/cache.db"
cache-duration: "12h"
# attachment-cache-dir intentionally UNSET -> attachments disabled
# (nyxloom notifications are typed text only; SPEC §13 injection boundary).

# ── Visitor limits (defense in depth; all real use is authenticated) ────────
visitor-request-limit-burst: 20
visitor-request-limit-replenish: "10s"
visitor-subscription-limit: 30
visitor-message-daily-limit: 500

# ── iOS instant push (OPTIONAL, disabled) ───────────────────────────────────
# iOS devices need the upstream relay for instant delivery (Android does not).
# Enabling sends poll-request metadata (not message content) to ntfy.sh:
# upstream-base-url: "https://ntfy.sh"

log-level: "info"
