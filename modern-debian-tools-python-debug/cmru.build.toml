project_root = "."
log_dir = "logs"
release_config = "../cmru.toml"

[env]
OCI_VENDOR = "Volker Badziong"
OCI_DESCRIPTION = """Modern Debian Tools + Python Debug image family.
Includes a curated Debian + Python environment with managed venv and CIU-focused workflow tooling.
Custom Tooling highlights: aider, agy, awscli, b2, bat, claude, codex, consul, fd, fzf, gh, htop, neovim, nvchad, openclaw, psql, reasonix, redis-cli, rga, ripgrep, shellcheck, vault, yq.
Midnight Commander defaults are shipped from the repo-backed customization root.
Devcontainer manifest: /usr/local/share/modern-debian-tools-python-debug/manifest.md
"""
OCI_DESCRIPTION_BASE = """Modern Debian Tools + Python Debug base image.
Plain Python-on-Debian runtime with curated CLI tooling, managed venv helpers, and release manifests for repeatable CI and local automation.
"""
OCI_DESCRIPTION_VSC = """Modern Debian Tools + Python Debug VS Code devcontainer image.
Microsoft devcontainers base plus curated CLI tooling, managed venv helpers, and repository-hosted release manifests for richer per-package documentation.
"""

# BUILD_DATE is commit-derived by the release-manager (no counter; the
# auto-increment keys were retired with the move to git-tag versioning).
[build_metadata]
date_env = "BUILD_DATE"
date_format = "%Y%m%d"

[steps.build-images]
no_cache_env = "BUILD_NO_CACHE"
bake_set_prefix = "base.args."
bake_set_vars = [
  "AWSCLI_VERSION",
  "B2_VERSION",
  "BACKPORTS_URI",
  "BAT_VERSION",
  "CODEX_VERSION",
  "CLAUDE_CODE_VERSION",
  "ANTIGRAVITY_VERSION",
  "AIDER_VERSION",
  "REASONIX_VERSION",
  "OPENCLAW_VERSION",
  "INSTALL_CODEX",
  "INSTALL_CLAUDE_CODE",
  "INSTALL_ANTIGRAVITY",
  "INSTALL_AIDER",
  "INSTALL_REASONIX",
  "INSTALL_OPENCLAW",
  "NODE_MAJOR",
  "DELTA_VERSION",
  "GH_VERSION",
  "GRPCURL_VERSION",
  "CONSUL_VERSION",
  "FD_VERSION",
  "FZF_VERSION",
  "POSTGRESQL_CLIENT_VERSION",
  "REDIS_TOOLS_VERSION",
  "RIPGREP_VERSION",
  "RGA_VERSION",
  "SHELLCHECK_VERSION",
  "VAULT_VERSION",
  "YQ_VERSION",
  "NVIM_VER",
  "NVCHAD_VER",
  "GITHUB_USERNAME",
  "GITHUB_REPO",
  "CIU_WHEEL_TAG",
  "CIU_WHEEL_ASSET_NAME",
  "CIU_INSTALL_REQUIRED",
  "OCI_TITLE",
  "OCI_DESCRIPTION",
  "OCI_DESCRIPTION_BASE",
  "OCI_DESCRIPTION_VSC",
  "OCI_SOURCE",
  "OCI_DOCUMENTATION",
  "OCI_URL",
  "OCI_LICENSES",
  "OCI_VENDOR",
  "OCI_VERSION",
  "OCI_REVISION",
  "OCI_CREATED",
  "DEVCONTAINERS_RELEASE_STABLE",
  "DEVCONTAINERS_RELEASE_DEV",
  "DEVCONTAINERS_VERSION_STABLE",
  "DEVCONTAINERS_VERSION_DEV",
  "DEVCONTAINERS_BASE_DYNAMIC_LATEST",
  "DEVCONTAINERS_DYNAMIC_LATEST_TAG",
  "DEVCONTAINERS_DYNAMIC_LATEST_PYTHON",
  "DEVCONTAINERS_DYNAMIC_LATEST_DEBIAN",
]
commands = [
  { label = "modern-debian-tools-python-debug: build images", argv = ["bash", "scripts/release-bake.sh", "build"], cwd = "." },
]

[steps.push-images]
bake_set_prefix = "base.args."
bake_set_vars = [
  "AWSCLI_VERSION",
  "B2_VERSION",
  "BACKPORTS_URI",
  "BAT_VERSION",
  "CODEX_VERSION",
  "CLAUDE_CODE_VERSION",
  "ANTIGRAVITY_VERSION",
  "AIDER_VERSION",
  "REASONIX_VERSION",
  "OPENCLAW_VERSION",
  "INSTALL_CODEX",
  "INSTALL_CLAUDE_CODE",
  "INSTALL_ANTIGRAVITY",
  "INSTALL_AIDER",
  "INSTALL_REASONIX",
  "INSTALL_OPENCLAW",
  "NODE_MAJOR",
  "DELTA_VERSION",
  "GH_VERSION",
  "GRPCURL_VERSION",
  "CONSUL_VERSION",
  "FD_VERSION",
  "FZF_VERSION",
  "POSTGRESQL_CLIENT_VERSION",
  "REDIS_TOOLS_VERSION",
  "RIPGREP_VERSION",
  "RGA_VERSION",
  "SHELLCHECK_VERSION",
  "VAULT_VERSION",
  "YQ_VERSION",
  "NVIM_VER",
  "NVCHAD_VER",
  "GITHUB_USERNAME",
  "GITHUB_REPO",
  "CIU_WHEEL_TAG",
  "CIU_WHEEL_ASSET_NAME",
  "CIU_INSTALL_REQUIRED",
  "OCI_TITLE",
  "OCI_DESCRIPTION",
  "OCI_DESCRIPTION_BASE",
  "OCI_DESCRIPTION_VSC",
  "OCI_SOURCE",
  "OCI_DOCUMENTATION",
  "OCI_URL",
  "OCI_LICENSES",
  "OCI_VENDOR",
  "OCI_VERSION",
  "OCI_REVISION",
  "OCI_CREATED",
  "DEVCONTAINERS_RELEASE_STABLE",
  "DEVCONTAINERS_RELEASE_DEV",
  "DEVCONTAINERS_VERSION_STABLE",
  "DEVCONTAINERS_VERSION_DEV",
  "DEVCONTAINERS_BASE_DYNAMIC_LATEST",
  "DEVCONTAINERS_DYNAMIC_LATEST_TAG",
  "DEVCONTAINERS_DYNAMIC_LATEST_PYTHON",
  "DEVCONTAINERS_DYNAMIC_LATEST_DEBIAN",
]
required_env = ["GITHUB_USERNAME", "GITHUB_PUSH_PAT"]

commands = [
  { label = "modern-debian-tools-python-debug: push images", argv = ["bash", "scripts/release-bake.sh", "push"], cwd = "." },
]

