# cmru.toml — the one config for releasing this monorepo (SPEC S2 schema).
#
# NO SECRETS here (this file is committed). The GitHub token is resolved at run time
# from $GITHUB_PUSH_PAT / $GITHUB_TOKEN, or the gitignored cmru.secret.toml overlay
# ([github].token). See SPEC S2.4 and cmru.sample.toml.
#
# Usage:  ./cmru status   ./cmru release   ./cmru cleanup --remove-assets 30d

[github]
owner      = "volkb79-2"
repo       = "vbpub"
owner_type = "user"          # "user" | "org"  (V03)

[targets]
host     = "github"          # release host (S11)
registry = ["ghcr.io"]       # OCI registries to push images to (S11.3)

[orchestration]
# Only projects listed here are auto-tagged/released by `status`/`release` (S-CLI.2).
# empyrion-translation stays on-demand (date-tagged game asset, not in this set).
project_order    = ["ciu", "cmru", "modern-debian-tools-python-debug", "pwmcp", "tls-edge"]
default_projects = ["ciu", "cmru", "modern-debian-tools-python-debug", "pwmcp", "tls-edge"]
default_steps    = ["run-tests", "build", "push", "validate"]
execution_mode   = "project-first"

[orchestration.step_project_order]
run-tests = ["ciu", "modern-debian-tools-python-debug", "pwmcp"]
build     = ["ciu", "cmru", "modern-debian-tools-python-debug", "pwmcp", "tls-edge"]
push      = ["ciu", "cmru", "modern-debian-tools-python-debug", "pwmcp", "tls-edge"]
validate  = ["ciu", "modern-debian-tools-python-debug", "pwmcp"]

[cleanup]
release_tag_prefixes = ["*"]
keep_release_tags    = ["ciu-latest", "cmru-latest", "pwmcp-latest"]
ghcr_packages        = ["*"]
ghcr_delete_packages = ["modern-debian-tools-python-debug-vsc-devcontainer-dev"]

[env]
# Shared env for all projects. Per-project defaults live in <project>/cmru.build.toml [env].

# ─── ciu — Python wheel (built-in handlers; only run-tests is ciu-specific) ────
# build/push/validate come from cmru's built-in wheel handlers (cmru/handlers.py).
# The only project-specific inputs are the test command and the release-notes text.
[project.ciu]
prefix    = "ciu-v"
artifacts = ["wheel"]        # → wheel profile: semver tag + GitHub Release + latest.json
scm_dist  = "ciu"
cwd       = "ciu"
[project.ciu.version]
strategy = "scm"
bump     = "conventional"
[project.ciu.env]
CIU_RELEASE_NOTES = "## CIU CLI wheel\nConfig-inheritance + Docker Compose stack orchestrator (render, up/down, health, bake, dev).\n\n**Install**\n```bash\npython -m pip install ./<wheel-file>\n```"
[project.ciu.steps.run-tests]
commands = [
  { label = "CIU: run tests", argv = ["python3", "run-ciu-tests.py"], cwd = "ciu" },
]

# ─── cmru — Python wheel (dogfood: zero step scripts, cmru built-in handlers) ──
# Declares the wheel profile and NO [steps.*]: cmru builds/publishes/validates it via
# its own built-in handlers (cmru/handlers.py). The only project-specific input is the
# release-notes text below (read by wheel-publish via --notes-env CMRU_RELEASE_NOTES).
# Proof that a standard Python wheel project needs ~7 lines of config and no scripts.
[project.cmru]
prefix    = "cmru-v"
artifacts = ["wheel"]
scm_dist  = "cmru"
cwd       = "cmru"
[project.cmru.version]
strategy = "scm"
bump     = "conventional"
[project.cmru.env]
CMRU_RELEASE_NOTES = "## cmru wheel\nBuild, publish, and release orchestration for CIU-family monorepos.\n\n**Install**\n```bash\npipx install cmru-*.whl\n```"

# ─── modern-debian-tools-python-debug — OCI images ────────────────────────────
# Deliverable is the ghcr image(s) only — NOT a GitHub Release. So: no semver git tag
# (version = image tag / BUILD_DATE), push images, and commit the regenerated manifests
# (build inputs/docs) via the generic commit_generated path. cmru orchestrates; the
# build step (build-push.py) owns what an image build + manifest regen actually means.
[project.modern-debian-tools-python-debug]
prefix    = "modern-debian-tools-python-debug-v"   # kept for resolve/cleanup symmetry; unused for tagging
artifacts = ["oci-image"]
cwd       = "modern-debian-tools-python-debug"
[project.modern-debian-tools-python-debug.version]
strategy = "none"          # OCI images aren't git-tagged
[project.modern-debian-tools-python-debug.release]
commit_generated = ["package-manifests-versioned"]   # project-relative; committed after build
[project.modern-debian-tools-python-debug.steps.build]
commands = [
  { label = "modern-debian-tools-python-debug: build images", argv = ["python3", "build-push.py", "--build"], cwd = "modern-debian-tools-python-debug" },
]
[project.modern-debian-tools-python-debug.steps.push]
commands = [
  { label = "modern-debian-tools-python-debug: push images", argv = ["python3", "build-push.py", "--push"], cwd = "modern-debian-tools-python-debug" },
]

# ─── pwmcp — OCI image + stack bundle ─────────────────────────────────────────
# pwmcp's version is playwright-driven (pwmcp-v<playwright>-r<N>), computed by
# scripts/resolve-playwright-version.py during build. So versioning is "delegated":
# cmru detects the change and runs build/publish, but the project owns its tag.
[project.pwmcp]
prefix    = "pwmcp-v"
artifacts = ["oci-image", "bundle"]   # emits BOTH a ghcr image and a GitHub-Release bundle
cwd       = "pwmcp"
[project.pwmcp.version]
strategy = "delegated"                 # playwright-driven pwmcp-v<pw>-r<N>; project owns the tag
[project.pwmcp.steps.build]
commands = [
  { label = "pwmcp: resolve playwright version + compute release tag", argv = ["python3", "scripts/resolve-playwright-version.py"], cwd = "pwmcp" },
  { label = "pwmcp: build playwright-server image", argv = ["python3", "build-push.py", "--build"], cwd = "pwmcp" },
  { label = "pwmcp: build stack bundle", argv = ["python3", "scripts/build-bundle.py"], cwd = "pwmcp" },
]
[project.pwmcp.steps.push]
commands = [
  { label = "pwmcp: push playwright-server image", argv = ["python3", "build-push.py", "--push"], cwd = "pwmcp" },
  { label = "pwmcp: publish stack bundle", argv = ["python3", "scripts/publish-bundle.py"], cwd = "pwmcp" },
]

# ─── tls-edge — tarball (built-in publish; in project_order) ───────────────────
# build step is project-owned (build-artifact.sh); push + validate come from the
# tarball built-in (cmru/handlers.py tarball-publish / tarball-validate).
# scripts/release.sh stays for standalone manual cuts; it calls scripts/publish-release.py,
# which routes through cmru.release.publish_versioned — the same keystone as the built-in.
# [project.tls-edge.installer] is the single source for the emitted get.py installer:
#   `cmru get-py --project tls-edge --config cmru.toml` regenerates tls-edge/get.py.
[project.tls-edge]
prefix    = "tls-edge-v"
artifacts = ["tarball"]
cwd       = "tls-edge"
[project.tls-edge.version]
strategy = "file:VERSION"     # version from tls-edge/VERSION; cmru tags + commits it
[project.tls-edge.installer]
install_dir_system = "/opt/tls-edge"
install_dir_user   = "tls-edge"
asset_suffix       = ".tar.xz"
# entrypoint not set — tls-edge has no bundled adapter (degrades cleanly: no adapter call, no venv)
required_commands  = ["python3", "docker"]
preserve           = ["ciu-stack/ciu.toml.j2", "edge-proxy/.env"]
manifest_name      = "manifest.json"
signature_name     = "manifest.json.minisig"
[project.tls-edge.env]
TLS_EDGE_RELEASE_NOTES = "## tls-edge tarball\nEdge proxy + TLS termination stack for the vbpub infra.\n\n**Verify**\n```bash\nsha256sum -c tls-edge-v*.tar.xz.sha256\n```"
[project.tls-edge.steps.build]
commands = [
  { label = "tls-edge: build tarball", argv = ["bash", "scripts/build-artifact.sh"], cwd = "tls-edge" },
]

# ─── empyrion-translation — game asset (delegated; NOT in project_order) ────────
# Self-managed, date-tagged (empyrion-de-translation-YYYYMMDD); not a CIU-family product.
# Released on demand via ./cmru.build.sh / ./cmru.publish.sh --project empyrion-translation.
[project.empyrion-translation]
prefix    = "empyrion-translation-v"
artifacts = ["tarball"]
cwd       = "game_stuff/empyrion"
[project.empyrion-translation.version]
strategy = "delegated"
[project.empyrion-translation.steps.build]
commands = [
  { label = "empyrion: package DE translation artifact", argv = ["python3", "release-empyrion-translation.py"], cwd = "game_stuff/empyrion" },
]
[project.empyrion-translation.steps.push]
commands = [
  { label = "empyrion: publish DE translation artifact", argv = ["python3", "release-empyrion-translation.py", "--publish-github", "--publish-only"], cwd = "game_stuff/empyrion" },
]
