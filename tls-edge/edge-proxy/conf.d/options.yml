# ─── TLS options baseline (dynamic config, hot-reloaded) ──────────────────────
# Applies to every router that uses the default TLS options (all of them,
# unless a router explicitly selects other options).
tls:
  options:
    default:
      minVersion: VersionTLS12
      # Reject TLS connections whose SNI matches no known certificate.
      # NOTE: this also rejects clients that send no SNI at all — e.g. probes
      # against the bare IP, some uptime checkers, openssl s_client without
      # -servername.  Set to false if such clients must be served the default
      # certificate instead.
      sniStrict: true
      # TLS 1.2 cipher allowlist (TLS 1.3 suites are not configurable and are
      # always the modern set).
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
