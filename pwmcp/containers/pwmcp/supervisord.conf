; pwmcp unified supervisor configuration
; =======================================
; Manages two services inside the pwmcp container:
;   run-server  — Playwright native WebSocket server on :3000
;   mcp         — @playwright/mcp HTTP/SSE server on :8931
;
; Designed to run as uid 1000 (non-root). All paths use /tmp or /var/log/supervisor
; so no root-owned directories are required at runtime.
;
; supervisord is launched as PID 1 with --nodaemon (see Dockerfile ENTRYPOINT).
; It reaps zombie children and forwards SIGTERM to both programs on shutdown.
;
; PWMCP_MCP_ALLOWED_HOSTS env var controls the @playwright/mcp --allowed-hosts
; value. Defaults to "localhost:8931,127.0.0.1:8931" for standalone usage.
; ciu compose injects the deployment-specific container names at runtime, e.g.:
;   PWMCP_MCP_ALLOWED_HOSTS=pwmcp:8931,myproject-dev-pwmcp:8931

[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid
childlogdir=/var/log/supervisor

; No unix_http_server block — we do not need supervisorctl from inside the
; container. Omitting it avoids the default /var/run/supervisor.sock path
; that requires root.

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[program:run-server]
command=playwright run-server --port 3000 --host 0.0.0.0
autorestart=true
startretries=5
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
; Propagate stdout/stderr to the parent process (docker logs).
stdout_events_enabled=true
stderr_events_enabled=true
environment=HOME="/home/ubuntu"

[program:mcp]
; playwright-mcp is the bin installed by `npm install -g @playwright/mcp`.
; It symlinks to /usr/lib/node_modules/@playwright/mcp/cli.js.
; --allowed-hosts is injected at container start via PWMCP_MCP_ALLOWED_HOSTS.
; --executable-path bypasses @playwright/mcp's bundled playwright-core chromium
; discovery (which may target a different revision) and uses the binary from the
; playwright JS package already installed in the image. PWMCP_CHROMIUM_PATH is
; exported by the entrypoint script from /etc/pwmcp-chromium-path.txt (baked at
; image build time).
command=playwright-mcp --headless --browser chromium --no-sandbox --executable-path %(ENV_PWMCP_CHROMIUM_PATH)s --port 8931 --host 0.0.0.0 --allowed-hosts %(ENV_PWMCP_MCP_ALLOWED_HOSTS)s
autorestart=true
startretries=5
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
stdout_events_enabled=true
stderr_events_enabled=true
environment=HOME="/home/ubuntu"
