project_root = "."
dist_dir = "dist"
bundle_dir = "bundle"

[archive]
# PWMCP_VERSION is written by scripts/resolve-playwright-version.py (e.g. "1.60.0-r2").
name_template = "pwmcp-{version}.tar.xz"
format = "xztar"
version_env = "PWMCP_VERSION"
fallback_env = "BUILD_DATE"

[copy]
# Consumer-facing stack files only. Maintainer-only files (Dockerfile, docker-bake.hcl,
# build-push.toml, bundle.toml, scripts/) are excluded — the image is already on GHCR.
files = [
  "ciu.compose.yml.j2",
  "ciu.defaults.toml.j2",
  "ciu.global.defaults.toml.j2",
  "ciu.global.toml.j2",
  "pwmcp.contract.json",
  "README.md",
]
dirs = ["docs", "client"]
