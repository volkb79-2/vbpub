project_root = "."
log_dir = "logs"
release_config = "../release.toml"

[steps.build-images]
commands = [
  { label = "pwmcp: build unified image", argv = ["docker", "buildx", "bake", "all", "--load"], cwd = "." },
]

[steps.push-images]
required_env = ["GITHUB_USERNAME", "GITHUB_PUSH_PAT"]

commands = [
  { label = "pwmcp: push unified image", argv = ["docker", "buildx", "bake", "all", "--push"], cwd = "." },
]

[steps.push-images.login]
registry = "ghcr.io"
username_env = "GITHUB_USERNAME"
token_env = "GITHUB_PUSH_PAT"
required = true
